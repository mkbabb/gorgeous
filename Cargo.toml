[package]
name = "gorgeous"
version = "0.1.1"
edition = "2024"
license = "MIT"
description = "Grammar-driven pretty printers auto-generated from BBNF grammars"
rust-version = "1.85"
repository = "https://github.com/mkbabb/gorgeous"
keywords = ["formatter", "pretty-printer", "bbnf", "grammar", "code-formatting"]
categories = ["command-line-utilities", "text-processing", "development-tools"]

[[bin]]
name = "gorgeous"
path = "src/main.rs"

[lib]
name = "gorgeous"
path = "src/lib.rs"

[dependencies]
parse_that = "0.1.1"
bbnf_derive = "0.1.1"
bbnf = "0.1.1"
pprint = "0.3.1"

[dev-dependencies]
bencher = "0.1"

[[bench]]
name = "prettify"
harness = false
