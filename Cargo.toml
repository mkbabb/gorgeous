[package]
name = "gorgeous"
version = "0.1.4"
edition = "2024"
license = "MIT"
description = "Grammar-driven pretty printers auto-generated from BBNF grammars"
rust-version = "1.85"
repository = "https://github.com/mkbabb/gorgeous"
keywords = ["formatter", "pretty-printer", "bbnf", "grammar", "code-formatting"]
categories = ["command-line-utilities", "text-processing", "development-tools"]

[[bin]]
name = "gorg"
path = "src/main.rs"

[lib]
name = "gorgeous"
path = "src/lib.rs"

[dependencies]
parse_that = { version = "0.3", features = ["diagnostics"] }
bbnf_derive = "0.2"
bbnf = "0.2"
pprint = "0.3"
[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
mimalloc = "0.1"

[dev-dependencies]
bencher = "0.1"
biome_css_parser = "=0.4.0"
biome_css_formatter = "=0.4.0"
biome_formatter = "=0.4.0"
biome_css_syntax = "=0.4.0"

[[bench]]
name = "gorgeous"
harness = false

[profile.bench]
inherits = "release"
lto = "fat"
codegen-units = 1
opt-level = 3
